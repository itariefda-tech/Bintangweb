<!doctype html>
<meta charset="utf-8">
<title>Profile audit bootstrap</title>
<script>
  fetch("/api/v1/auth/register", {
    method: "POST",
    credentials: "same-origin",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      name: "Responsive Audit Member",
      email: `audit-${Date.now()}@example.com`,
      password: "securepass123",
    }),
  })
    .then((response) => {
      if (!response.ok) throw new Error("Audit registration failed");
      window.location.replace("/member/profile");
    })
    .catch((error) => {
      document.body.textContent = error.message;
    });
</script>
